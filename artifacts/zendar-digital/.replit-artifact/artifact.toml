kind = "web"
previewPath = "/"
title = "Zendar Digital"
version = "1.0.0"
id = "artifacts/zendar-digital"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18099

[services.development]
run = "pnpm --filter @workspace/zendar-digital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zendar-digital", "run", "build" ]
publicDir = "artifacts/zendar-digital/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18099"
BASE_PATH = "/"
